name: Final site polish

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/final-site-polish.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  polish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Create polish script
        run: |
          cat > /tmp/final_polish.py <<'PY'
          from __future__ import annotations

          import json
          import re
          import sys
          from collections import Counter
          from datetime import date
          from html.parser import HTMLParser
          from pathlib import Path

          INDEX = Path("index.html")

          def read_index() -> str:
              return INDEX.read_text(encoding="utf-8")

          def write_index(text: str) -> None:
              INDEX.write_text(text, encoding="utf-8")

          def insert_before_once(text: str, marker: str, addition: str, unique: str) -> str:
              if unique in text:
                  return text
              if marker not in text:
                  raise RuntimeError(f"Marker not found: {marker[:80]}")
              return text.replace(marker, addition + marker, 1)

          def insert_after_once(text: str, marker: str, addition: str, unique: str) -> str:
              if unique in text:
                  return text
              if marker not in text:
                  raise RuntimeError(f"Marker not found: {marker[:80]}")
              return text.replace(marker, marker + addition, 1)

          def step1() -> None:
              text = read_index()

              if '<meta name="theme-color"' not in text:
                  text = text.replace(
                      '  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>\n',
                      '  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>\n'
                      '  <meta name="theme-color" content="#111111" />\n',
                      1,
                  )

              text = insert_after_once(
                  text,
                  '  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />\n',
                  '  <link rel="icon" href="/favicon.png" type="image/png" sizes="512x512" />\n'
                  '  <link rel="apple-touch-icon" href="/favicon.png" />\n',
                  'href="/favicon.png"',
              )

              if '<meta property="og:locale"' not in text:
                  text = text.replace(
                      '  <meta property="og:type" content="website" />\n',
                      '  <meta property="og:type" content="website" />\n'
                      '  <meta property="og:locale" content="en_US" />\n',
                      1,
                  )

              text = text.replace(
                  'https://straightlinecreative.github.io/assets/images/social-share.svg',
                  'https://straightlinecreative.github.io/assets/images/social-share.png',
              )
              text = text.replace(
                  '<meta property="og:image:type" content="image/svg+xml" />',
                  '<meta property="og:image:type" content="image/png" />',
              )

              schema = '''  <script type="application/ld+json">
            {
              "@context": "https://schema.org",
              "@type": "Organization",
              "name": "Straightline Creative",
              "url": "https://straightlinecreative.github.io/",
              "logo": "https://straightlinecreative.github.io/favicon.png",
              "image": "https://straightlinecreative.github.io/assets/images/social-share.png",
              "description": "Straightline Creative helps people turn ideas into podcasts, videos, and stories that educate, inspire, and connect.",
              "founder": {
                "@type": "Person",
                "name": "Kevin Cook"
              }
            }
            </script>

          '''
              text = insert_before_once(
                  text,
                  '  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;600;700;900&display=swap" rel="stylesheet"/>',
                  schema,
                  'type="application/ld+json"',
              )
              write_index(text)

              Path("robots.txt").write_text(
                  "User-agent: *\nAllow: /\n\nSitemap: https://straightlinecreative.github.io/sitemap.xml\n",
                  encoding="utf-8",
              )
              Path("sitemap.xml").write_text(
                  '<?xml version="1.0" encoding="UTF-8"?>\n'
                  '<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">\n'
                  '  <url>\n'
                  '    <loc>https://straightlinecreative.github.io/</loc>\n'
                  '    <changefreq>monthly</changefreq>\n'
                  '    <priority>1.0</priority>\n'
                  '  </url>\n'
                  '</urlset>\n',
                  encoding="utf-8",
              )

          def step2() -> None:
              text = read_index()

              accessibility_css = '''    /* ── ACCESSIBILITY ── */
              .skip-link {
                position: fixed;
                top: 0.75rem;
                left: 0.75rem;
                z-index: 1000;
                padding: 0.75rem 1rem;
                border-radius: 4px;
                background: var(--mint);
                color: var(--black);
                font-weight: 900;
                text-decoration: none;
                transform: translateY(-150%);
                transition: transform 0.2s;
              }

              .skip-link:focus {
                transform: translateY(0);
              }

              .sr-only {
                position: absolute !important;
                width: 1px !important;
                height: 1px !important;
                padding: 0 !important;
                margin: -1px !important;
                overflow: hidden !important;
                clip: rect(0, 0, 0, 0) !important;
                white-space: nowrap !important;
                border: 0 !important;
              }

              :where(a, button, input, textarea):focus-visible {
                outline: 3px solid var(--mint);
                outline-offset: 3px;
              }

              .form-field {
                min-width: 0;
              }

          '''
              text = insert_before_once(
                  text,
                  '    /* ── NAV ── */',
                  accessibility_css,
                  '/* ── ACCESSIBILITY ── */',
              )

              text = insert_after_once(
                  text,
                  '<body>\n',
                  '  <a class="skip-link" href="#main-content">Skip to main content</a>\n\n',
                  'class="skip-link"',
              )
              text = insert_before_once(
                  text,
                  '  <!-- HERO -->',
                  '  <main id="main-content">\n',
                  '<main id="main-content">',
              )
              text = insert_before_once(
                  text,
                  '  <!-- FOOTER -->',
                  '  </main>\n\n',
                  '</main>\n\n  <!-- FOOTER -->',
              )

              old_fields = '''        <div class="form-row">
                  <input type="text" name="name" placeholder="Your Name" required />
                  <input type="email" name="email" placeholder="Your Email" required />
                </div>
                <input type="text" name="subject" placeholder="What's this about?" />
                <textarea name="message" placeholder="Tell me about your idea or project..." required></textarea>'''
              new_fields = '''        <div class="form-row">
                  <div class="form-field">
                    <label class="sr-only" for="contact-name">Your name</label>
                    <input id="contact-name" type="text" name="name" autocomplete="name" placeholder="Your Name" required />
                  </div>
                  <div class="form-field">
                    <label class="sr-only" for="contact-email">Your email</label>
                    <input id="contact-email" type="email" name="email" autocomplete="email" placeholder="Your Email" required />
                  </div>
                </div>
                <div class="form-field">
                  <label class="sr-only" for="contact-subject">Project subject</label>
                  <input id="contact-subject" type="text" name="subject" autocomplete="off" placeholder="What's this about?" />
                </div>
                <div class="form-field">
                  <label class="sr-only" for="contact-message">Tell me about your idea or project</label>
                  <textarea id="contact-message" name="message" placeholder="Tell me about your idea or project..." required></textarea>
                </div>'''
              if old_fields in text:
                  text = text.replace(old_fields, new_fields, 1)

              old_dialog = '<div id="video-modal-dialog" class="video-modal-dialog" role="dialog" aria-modal="true" aria-label="Video player">\n      <button id="video-modal-close"'
              new_dialog = '<div id="video-modal-dialog" class="video-modal-dialog" role="dialog" aria-modal="true" aria-labelledby="video-modal-title">\n      <h2 id="video-modal-title" class="sr-only">Portfolio video</h2>\n      <button id="video-modal-close"'
              if old_dialog in text:
                  text = text.replace(old_dialog, new_dialog, 1)

              old_key_handler = '''    document.addEventListener('keydown', (event) => {
                  if (event.key === 'Escape' && videoModal.classList.contains('open')) {
                    closeVideoModal();
                  }
                });'''
              new_key_handler = '''    document.addEventListener('keydown', (event) => {
                  if (!videoModal.classList.contains('open')) return;

                  if (event.key === 'Escape') {
                    closeVideoModal();
                    return;
                  }

                  if (event.key === 'Tab') {
                    const focusable = Array.from(
                      videoModalDialog.querySelectorAll('button, iframe, [href], [tabindex]:not([tabindex="-1"])')
                    ).filter((element) => !element.hasAttribute('disabled'));

                    if (!focusable.length) return;

                    const first = focusable[0];
                    const last = focusable[focusable.length - 1];

                    if (event.shiftKey && document.activeElement === first) {
                      event.preventDefault();
                      last.focus();
                    } else if (!event.shiftKey && document.activeElement === last) {
                      event.preventDefault();
                      first.focus();
                    }
                  }
                });'''
              if old_key_handler in text:
                  text = text.replace(old_key_handler, new_key_handler, 1)

              write_index(text)

          def step3() -> None:
              text = read_index()

              performance_links = '''  <link rel="preconnect" href="https://fonts.googleapis.com" />
            <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
            <link rel="dns-prefetch" href="//i.ytimg.com" />
            '''
              text = insert_before_once(
                  text,
                  '  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;600;700;900&display=swap" rel="stylesheet"/>',
                  performance_links,
                  'rel="preconnect" href="https://fonts.googleapis.com"',
              )

              story_img = '<img class="story-photo" src="assets/images/20250829_112543.jpg" alt="Kevin Cook, founder of Straightline Creative" />'
              story_img_new = '<img class="story-photo" src="assets/images/20250829_112543.jpg" alt="Kevin Cook, founder of Straightline Creative" width="900" height="1200" loading="lazy" decoding="async" />'
              text = text.replace(story_img, story_img_new)

              text = re.sub(
                  r'(<img\b[^>]*\bloading="lazy")(?![^>]*\bdecoding=)',
                  r'\1 decoding="async"',
                  text,
              )
              text = text.replace(
                  'https://www.youtube.com/embed/${videoId}?autoplay=1&rel=0',
                  'https://www.youtube-nocookie.com/embed/${videoId}?autoplay=1&rel=0',
              )
              text = text.replace(
                  'allowfullscreen></iframe>',
                  'loading="lazy" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>',
                  1,
              )
              write_index(text)

          def step4() -> None:
              text = read_index()
              mobile_css = '''    /* ── TOUCH & SMALL-SCREEN POLISH ── */
              button,
              a,
              input,
              textarea {
                touch-action: manipulation;
              }

              .btn,
              .nav-toggle,
              .video-modal-close {
                min-height: 44px;
              }

              .channel-link {
                display: inline-flex;
                align-items: center;
                min-height: 44px;
                overflow-wrap: anywhere;
              }

              .contact-form input {
                min-height: 48px;
              }

              @media (max-width: 768px) {
                nav ul {
                  max-height: calc(100vh - 70px);
                  overflow-y: auto;
                }
              }

              @media (max-width: 520px) {
                section,
                #services,
                #contact {
                  padding: 3.5rem 1rem;
                }

                #hero {
                  padding: 7rem 1rem 3.5rem;
                }

                .section-title {
                  line-height: 1.05;
                }

                .featured-media {
                  gap: 0.6rem;
                  padding: 0.75rem;
                }

                .featured-show-copy,
                .supporting-project-card .featured-show-copy,
                .compact-project-card .featured-show-copy {
                  padding: 1.25rem;
                }

                .work-tier-label {
                  margin-top: 1.1rem;
                }

                .video-modal-dialog {
                  max-height: calc(100vh - 5rem);
                }

                .video-modal-close {
                  top: -46px;
                }
              }

              @media (max-width: 420px) {
                .hero-eyebrow,
                .hero-note {
                  max-width: 270px;
                }

                .project-focus span {
                  font-size: 0.68rem;
                }

                .video-label {
                  left: 0.75rem;
                  right: 0.75rem;
                  font-size: 0.7rem;
                }
              }

          '''
              text = insert_before_once(
                  text,
                  '    @media (prefers-reduced-motion: reduce) {',
                  mobile_css,
                  '/* ── TOUCH & SMALL-SCREEN POLISH ── */',
              )
              write_index(text)

          def step5() -> None:
              text = read_index()
              text = text.replace('      align-items: start;\n', '      align-items: stretch;\n', 1)

              portfolio_css = '''    /* ── PORTFOLIO CONSISTENCY ── */
              .featured-show-copy h3 {
                line-height: 1.12;
              }

              .featured-show-copy > p:not(.project-series):not(.project-role) {
                max-width: 62ch;
              }

              .project-role {
                margin-bottom: 0.35rem !important;
              }

              .featured-show-copy > .channel-link {
                align-self: flex-start;
                margin-top: auto;
                padding-top: 0.5rem;
              }

          '''
              text = insert_before_once(
                  text,
                  '    /* ── VIDEO MODAL ── */',
                  portfolio_css,
                  '/* ── PORTFOLIO CONSISTENCY ── */',
              )

              card_changes = {
                  '<article class="show-card featured-show-card heated-card">': '<article class="show-card featured-show-card heated-card" aria-labelledby="project-heated-reverence">',
                  '<h3>Heated Reverence</h3>': '<h3 id="project-heated-reverence">Heated Reverence</h3>',
                  '<article class="show-card supporting-project-card">': '<article class="show-card supporting-project-card" aria-labelledby="project-grow-everything">',
                  '<h3>Grow Everything</h3>': '<h3 id="project-grow-everything">Grow Everything</h3>',
                  '<article class="show-card supporting-project-card leap-card">': '<article class="show-card supporting-project-card leap-card" aria-labelledby="project-seven-figure-leap">',
                  '<h3>7 Figure Leap</h3>': '<h3 id="project-seven-figure-leap">7 Figure Leap</h3>',
                  '<article class="show-card compact-project-card recruiting-card">': '<article class="show-card compact-project-card recruiting-card" aria-labelledby="project-recruiting-cities">',
                  '<h3>Recruiting Across Cities</h3>': '<h3 id="project-recruiting-cities">Recruiting Across Cities</h3>',
                  '<article class="show-card compact-project-card daddy-card">': '<article class="show-card compact-project-card daddy-card" aria-labelledby="project-better-call-daddy">',
                  '<h3>Better Call Daddy</h3>': '<h3 id="project-better-call-daddy">Better Call Daddy</h3>',
                  '<p class="project-role">Clip Selection · City Titles · Music Sync · Color Correction</p>': '<p class="project-role">What I created: Clip Selection · City Titles · Music Sync · Color Correction</p>',
              }
              for old, new in card_changes.items():
                  text = text.replace(old, new, 1)

              write_index(text)

          class AuditParser(HTMLParser):
              def __init__(self) -> None:
                  super().__init__()
                  self.ids: list[str] = []
                  self.h1_count = 0
                  self.images_without_alt: list[str] = []
                  self.blank_links_without_noopener: list[str] = []
                  self.empty_links: list[str] = []
                  self.labels_for: set[str] = set()
                  self.controls: list[tuple[str, str]] = []
                  self.local_refs: list[str] = []

              def handle_starttag(self, tag: str, attrs_list: list[tuple[str, str | None]]) -> None:
                  attrs = dict(attrs_list)
                  if "id" in attrs and attrs["id"]:
                      self.ids.append(str(attrs["id"]))
                  if tag == "h1":
                      self.h1_count += 1
                  if tag == "img" and "alt" not in attrs:
                      self.images_without_alt.append(str(attrs.get("src", "unknown")))
                  if tag == "a":
                      href = str(attrs.get("href", ""))
                      if not href:
                          self.empty_links.append("anchor without href")
                      if attrs.get("target") == "_blank" and "noopener" not in str(attrs.get("rel", "")):
                          self.blank_links_without_noopener.append(href)
                  if tag == "label" and attrs.get("for"):
                      self.labels_for.add(str(attrs["for"]))
                  if tag in {"input", "textarea"}:
                      control_type = str(attrs.get("type", "text"))
                      if control_type not in {"hidden", "submit", "button"}:
                          self.controls.append((str(attrs.get("id", "")), tag))
                  for key in ("src", "href"):
                      value = attrs.get(key)
                      if value and str(value).startswith("/") and not str(value).startswith("//"):
                          self.local_refs.append(str(value))

          def step6() -> None:
              text = read_index()
              parser = AuditParser()
              parser.feed(text)

              errors: list[str] = []
              duplicate_ids = [item for item, count in Counter(parser.ids).items() if count > 1]
              if duplicate_ids:
                  errors.append(f"Duplicate IDs: {duplicate_ids}")
              if parser.h1_count != 1:
                  errors.append(f"Expected exactly one H1, found {parser.h1_count}")
              if parser.images_without_alt:
                  errors.append(f"Images missing alt text: {parser.images_without_alt}")
              if parser.blank_links_without_noopener:
                  errors.append(f"New-tab links missing noopener: {parser.blank_links_without_noopener}")
              if parser.empty_links:
                  errors.append("One or more anchors are missing href values")
              for control_id, tag in parser.controls:
                  if not control_id or control_id not in parser.labels_for:
                      errors.append(f"Unlabelled form control: {tag}#{control_id or 'missing-id'}")
              if "Heated Reverance" in text:
                  errors.append("Old Heated Reverance spelling remains")
              if text.count('<main id="main-content">') != 1:
                  errors.append("Main landmark is missing or duplicated")
              if "assets/images/social-share.png" not in text:
                  errors.append("PNG social preview is not connected")
              if 'href="/favicon.png"' not in text:
                  errors.append("PNG favicon fallback is not connected")

              for ref in sorted(set(parser.local_refs)):
                  local = Path(ref.lstrip("/"))
                  if ref == "/":
                      continue
                  if not local.exists():
                      errors.append(f"Missing local asset: {ref}")

              for required in (Path("robots.txt"), Path("sitemap.xml")):
                  if not required.exists():
                      errors.append(f"Missing required file: {required}")

              if errors:
                  raise SystemExit("\n".join(errors))

              Path("docs").mkdir(exist_ok=True)
              report = f'''# Launch Readiness Report

          Last automated review: {date.today().isoformat()}

          ## Automated checks passed

          - One semantic H1 and one main landmark
          - Unique HTML IDs
          - Alternative text on every image
          - Labels connected to all contact form controls
          - Safe `rel="noopener"` handling on new-tab links
          - Local favicon and social-preview assets are present
          - Canonical URL, structured data, robots file, and sitemap are present
          - Heated Reverence spelling is consistent
          - Video modal keyboard focus is contained while open
          - Responsive touch targets and small-screen spacing rules are present

          ## Manual checks still required before a public announcement

          - Submit one real contact-form message and confirm it arrives in the intended inbox
          - Open the deployed site on an iPhone or iPad in Safari
          - Open the deployed site on an Android phone in Chrome
          - Confirm the current social preview after platform caches refresh

          These manual checks involve external services or physical browser environments and cannot be proven by repository validation alone.
          '''
              Path("docs/launch-readiness.md").write_text(report, encoding="utf-8")

          steps = {
              "1": step1,
              "2": step2,
              "3": step3,
              "4": step4,
              "5": step5,
              "6": step6,
          }

          if len(sys.argv) != 2 or sys.argv[1] not in steps:
              raise SystemExit("Usage: final_polish.py <1-6>")
          steps[sys.argv[1]]()
          PY

      - name: 1. Complete technical SEO
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq librsvg2-bin
          rsvg-convert -w 512 -h 512 favicon.svg -o favicon.png
          rsvg-convert -w 1200 -h 630 assets/images/social-share.svg -o assets/images/social-share.png
          python /tmp/final_polish.py 1
          git add index.html favicon.png assets/images/social-share.png robots.txt sitemap.xml
          git commit -m "Complete technical SEO"

      - name: 2. Complete accessibility pass
        run: |
          python /tmp/final_polish.py 2
          git add index.html
          git commit -m "Complete accessibility pass"

      - name: 3. Complete performance pass
        run: |
          python /tmp/final_polish.py 3
          git add index.html
          git commit -m "Complete performance pass"

      - name: 4. Complete mobile polish
        run: |
          python /tmp/final_polish.py 4
          git add index.html
          git commit -m "Complete mobile polish"

      - name: 5. Complete portfolio polish
        run: |
          python /tmp/final_polish.py 5
          git add index.html
          git commit -m "Complete portfolio polish"

      - name: 6. Complete launch readiness
        run: |
          python /tmp/final_polish.py 6

          check_url() {
            label="$1"
            url="$2"
            code=$(curl -L -sS -o /dev/null -w '%{http_code}' --max-time 20 "$url" || true)
            printf -- '- %s endpoint returned HTTP %s during the automated review.\n' "$label" "${code:-unavailable}" >> docs/launch-readiness.md
          }

          printf '\n## External endpoint checks\n\n' >> docs/launch-readiness.md
          check_url "Calendly" "https://calendly.com/straightlinecreative/30min"
          check_url "Formspree" "https://formspree.io/f/mzdljvkp"
          check_url "Heated Reverence video" "https://www.youtube.com/watch?v=QBVQsOuC3xs"

          rm .github/workflows/final-site-polish.yml
          git add -A
          git commit -m "Complete launch readiness checks"

      - name: Publish ordered commits
        run: git push
