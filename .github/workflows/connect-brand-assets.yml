name: Finish launch accessibility pass

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  finish-launch-pass:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Add PNG favicon and accessibility improvements
        run: |
          base64 --decode .tmp-assets/favicon.b64 > favicon.png

          python - <<'PY'
          from pathlib import Path

          path = Path('index.html')
          text = path.read_text(encoding='utf-8')

          svg_icon = '  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />'
          png_icons = (
              svg_icon + '\n'
              '  <link rel="icon" href="/favicon.png" type="image/png" sizes="512x512" />\n'
              '  <link rel="apple-touch-icon" href="/favicon.png" />'
          )
          if 'href="/favicon.png"' not in text:
              text = text.replace(svg_icon, png_icons)

          css_anchor = '    section[id] { scroll-margin-top: 6rem; }'
          accessibility_css = '''    section[id] { scroll-margin-top: 6rem; }

    :focus-visible {
      outline: 3px solid var(--mint);
      outline-offset: 3px;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }'''
          if '.sr-only {' not in text:
              text = text.replace(css_anchor, accessibility_css)

          old_form = '''        <div class="form-row">
          <input type="text" name="name" placeholder="Your Name" required />
          <input type="email" name="email" placeholder="Your Email" required />
        </div>
        <input type="text" name="subject" placeholder="What's this about?" />
        <textarea name="message" placeholder="Tell me about your idea or project..." required></textarea>'''
          new_form = '''        <div class="form-row">
          <div>
            <label class="sr-only" for="contact-name">Your Name</label>
            <input id="contact-name" type="text" name="name" autocomplete="name" placeholder="Your Name" required />
          </div>
          <div>
            <label class="sr-only" for="contact-email">Your Email</label>
            <input id="contact-email" type="email" name="email" autocomplete="email" placeholder="Your Email" required />
          </div>
        </div>
        <label class="sr-only" for="contact-subject">What is this about?</label>
        <input id="contact-subject" type="text" name="subject" autocomplete="off" placeholder="What's this about?" />
        <label class="sr-only" for="contact-message">Tell me about your idea or project</label>
        <textarea id="contact-message" name="message" placeholder="Tell me about your idea or project..." required></textarea>'''
          if 'id="contact-name"' not in text:
              text = text.replace(old_form, new_form)

          old_keydown = '''    document.addEventListener('keydown', (event) => {
      if (event.key === 'Escape' && videoModal.classList.contains('open')) {
        closeVideoModal();
      }
    });'''
          new_keydown = '''    document.addEventListener('keydown', (event) => {
      if (!videoModal.classList.contains('open')) return;

      if (event.key === 'Escape') {
        closeVideoModal();
        return;
      }

      if (event.key === 'Tab') {
        const focusableElements = Array.from(
          videoModal.querySelectorAll('button, [href], input, select, textarea, [tabindex]:not([tabindex="-1"])')
        ).filter((element) => !element.disabled && element.offsetParent !== null);

        if (!focusableElements.length) return;

        const firstElement = focusableElements[0];
        const lastElement = focusableElements[focusableElements.length - 1];

        if (event.shiftKey && document.activeElement === firstElement) {
          event.preventDefault();
          lastElement.focus();
        } else if (!event.shiftKey && document.activeElement === lastElement) {
          event.preventDefault();
          firstElement.focus();
        }
      }
    });'''
          if 'focusableElements' not in text:
              text = text.replace(old_keydown, new_keydown)

          path.write_text(text, encoding='utf-8')
          PY

      - name: Remove temporary files and workflow
        run: |
          rm -rf .tmp-assets
          rm -f .launch-pass-trigger
          rm .github/workflows/connect-brand-assets.yml

      - name: Commit finished launch pass
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Add PNG favicon and accessibility improvements"
          git push
