name: Render social PNG

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/render-social-png.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Render PNG from branded SVG
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq librsvg2-bin
          rsvg-convert \
            --width 1200 \
            --height 630 \
            assets/images/social-share.svg \
            --output assets/images/social-share.png

      - name: Commit final PNG and remove helper
        run: |
          rm .github/workflows/render-social-png.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/images/social-share.png .github/workflows/render-social-png.yml
          git commit -m "Render final social sharing PNG"
          git push
