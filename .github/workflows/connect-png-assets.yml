name: Connect PNG sharing assets

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/connect-png-assets.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  connect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update metadata and manifest
        run: |
          python - <<'PY'
          from pathlib import Path
          import json

          index = Path('index.html')
          text = index.read_text(encoding='utf-8')
          text = text.replace(
              '  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />',
              '  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />\n'
              '  <link rel="icon" href="/favicon.png" type="image/png" sizes="512x512" />\n'
              '  <link rel="apple-touch-icon" href="/favicon.png" />'
          )
          text = text.replace('assets/images/social-share.svg', 'assets/images/social-share.png')
          text = text.replace('content="image/svg+xml"', 'content="image/png"')
          text = text.replace('https://straightlinecreative.github.io/favicon.svg', 'https://straightlinecreative.github.io/favicon.png')
          index.write_text(text, encoding='utf-8')

          manifest_path = Path('site.webmanifest')
          manifest = json.loads(manifest_path.read_text(encoding='utf-8'))
          manifest['icons'] = [
              {
                  'src': '/favicon.png',
                  'sizes': '512x512',
                  'type': 'image/png',
                  'purpose': 'any'
              },
              {
                  'src': '/favicon.svg',
                  'sizes': 'any',
                  'type': 'image/svg+xml',
                  'purpose': 'any'
              }
          ]
          manifest_path.write_text(json.dumps(manifest, indent=2) + '\n', encoding='utf-8')
          PY

      - name: Commit and remove helper workflow
        run: |
          rm .github/workflows/connect-png-assets.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html site.webmanifest .github/workflows/connect-png-assets.yml
          git commit -m "Use PNG sharing and favicon assets"
          git push
